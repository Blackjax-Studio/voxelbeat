services:
  db:
    image: pgvector/pgvector:pg15
    container_name: voxel-db
    environment:
      POSTGRES_DB: voxel
      POSTGRES_USER: local
      POSTGRES_PASSWORD: local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U local -d voxel"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway
    container_name: voxel-flyway
    command: -url=jdbc:postgresql://db:5432/voxel -user=local -password=local -baselineOnMigrate=true migrate
    volumes:
      - ./db/migrations:/flyway/sql
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
